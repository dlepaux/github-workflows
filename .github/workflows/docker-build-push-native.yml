name: Docker Build & Push (Native Multi-Arch)

# Multi-arch Docker builds using native runners — no QEMU emulation.
# Each platform builds on its matching runner, then manifests are merged.
# Requires self-hosted runners with labels: X64, ARM64.

on:
  workflow_call:
    inputs:
      image-name:
        description: Full image name including registry
        type: string
        required: true
      version:
        description: Version tag without v prefix (empty = no version tag)
        type: string
        default: ''
      build-args:
        description: Docker build args as multiline KEY=VALUE (one per line)
        type: string
        default: ''

jobs:
  wake:
    uses: dlepaux/github-workflows/.github/workflows/wake-compute.yml@main

  build:
    needs: wake
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: '["self-hosted", "homelab", "X64"]'
          - platform: linux/arm64
            runner: '["self-hosted", "homelab", "ARM64"]'
    runs-on: ${{ fromJSON(matrix.runner) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image-name }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          # Supply-chain attestations: SBOM (what's inside) + provenance
          # (how it was built). Adds ~30s per arch build; carried into the
          # final multi-arch manifest because each per-arch image is pushed
          # with its own attestation manifest, and `imagetools create` in
          # the merge step preserves them.
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ inputs.image-name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          # Self-hosted runners persist /tmp across jobs; wipe stale digest
          # files from prior runs so upload-artifact only picks up this
          # run's digest. Without this, the merge step tries to create a
          # manifest referencing digests that GHCR has already garbage-
          # collected, failing with "not found".
          rm -rf /tmp/digests
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: [self-hosted, homelab]
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clean workspace
        # Same rationale as the build job's Export digest step — prevent a
        # previous run's digest files from slipping into the manifest.
        run: rm -rf /tmp/digests

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=raw,value=latest
            type=sha
            ${{ inputs.version != '' && format('type=raw,value={0}', inputs.version) || '' }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ inputs.image-name }}@sha256:%s ' *)
