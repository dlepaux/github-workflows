name: Docker Build & Push (Buildx)

on:
  workflow_call:
    inputs:
      image-name:
        description: Full image name including registry
        type: string
        required: true
      version:
        description: Version tag without v prefix (empty = no version tag)
        type: string
        default: ''
      platforms:
        description: Target platforms (comma-separated)
        type: string
        default: linux/amd64,linux/arm64
      build-args:
        description: Docker build args as multiline KEY=VALUE (one per line)
        type: string
        default: ''
      runner:
        description: Runner to use (default self-hosted ARM64, override with ubuntu-latest for heavy amd64 builds)
        type: string
        default: '["self-hosted", "homelab"]'

jobs:
  docker:
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=raw,value=latest
            type=sha
            ${{ inputs.version != '' && format('type=raw,value={0}', inputs.version) || '' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          # No GHA cache on self-hosted — Docker layer cache is local
