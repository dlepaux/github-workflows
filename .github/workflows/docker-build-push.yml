name: Docker Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        description: Full image name including registry
        type: string
        required: true
      version:
        description: Version tag without v prefix (empty = no version tag)
        type: string
        default: ''
      build-args:
        description: Docker build args as multiline KEY=VALUE (one per line)
        type: string
        default: ''

jobs:
  docker:
    runs-on: [self-hosted, homelab]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Isolate Docker credentials
        run: |
          DOCKER_CONFIG="$(mktemp -d)"
          echo "DOCKER_CONFIG=$DOCKER_CONFIG" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build Docker image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="-t ${{ inputs.image-name }}:latest -t ${{ inputs.image-name }}:sha-${SHORT_SHA}"
          if [ -n "${{ inputs.version }}" ]; then
            TAGS="${TAGS} -t ${{ inputs.image-name }}:${{ inputs.version }}"
          fi
          BUILD_ARGS=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            BUILD_ARGS="${BUILD_ARGS} --build-arg ${line}"
          done <<< "${{ inputs.build-args }}"
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --load \
            ${BUILD_ARGS} ${TAGS} .

      - name: Push Docker image
        run: docker push --all-tags ${{ inputs.image-name }}

      - name: Cleanup credentials
        if: always()
        run: |
          docker logout ghcr.io || true
          rm -rf "$DOCKER_CONFIG"
